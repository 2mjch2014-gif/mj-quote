<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100px;
    padding: 20px 16px;
  }
  .banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    max-width: 860px;
    width: 100%;
    flex-wrap: wrap;
  }
  .left {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
    min-width: 220px;
  }
  .icon {
    width: 44px; height: 44px;
    background: #c46a1a;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .text-block .headline {
    font-family: 'Georgia', serif;
    font-size: 17px;
    font-weight: bold;
    color: #ffffff;
    line-height: 1.3;
  }
  .text-block .sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
  }
  .divider {
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .perks {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .perk {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
  }
  .perk-dot {
    width: 6px; height: 6px;
    background: #c46a1a;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .btn {
    display: inline-block;
    background: #c0392b;
    color: #fff;
    font-family: 'Georgia', serif;
    font-size: 15px;
    font-weight: bold;
    padding: 13px 28px;
    border-radius: 6px;
    text-decoration: none;
    white-space: nowrap;
    letter-spacing: 0.3px;
    border: 2px solid #c0392b;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .btn:hover {
    background: #a93226;
    border-color: #a93226;
  }
  .btn span {
    display: block;
    font-size: 10px;
    font-weight: normal;
    opacity: 0.85;
    letter-spacing: 0.5px;
    margin-top: 1px;
    font-family: Arial, sans-serif;
  }

  @media (max-width: 600px) {
    .banner { justify-content: center; text-align: center; }
    .left { justify-content: center; }
    .divider { display: none; }
    .perks { justify-content: center; }
    .btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>
<div class="banner">
  <div class="left">
    <div class="icon">🏠</div>
    <div class="text-block">
      <div class="headline">Greater Houston & DFW · Free Inspection</div>
      <div class="sub">No obligation · Results in 2 minutes</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="perks">
    <div class="perk"><div class="perk-dot"></div>30-Year Warranty</div>
    <div class="perk"><div class="perk-dot"></div>$200/mo Financing</div>
    <div class="perk"><div class="perk-dot"></div>Licensed & Insured</div>
  </div>

  <a class="btn" href="https://www.mjroofmaster.com/free-estimate" target="_top">
    🔥 Get Free Estimate
    <span>INSTANT ONLINE QUOTE</span>
  </a>
</div>
</body>
</html>
